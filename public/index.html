<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agent Analyse Devis — MaPrimeRénov' 2026</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f9fafb;color:#111827;min-height:100vh}
    .container{max-width:760px;margin:0 auto;padding:28px 18px 64px}
    .header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
    .logo{width:44px;height:44px;background:#1d4ed8;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .header h1{font-size:19px;font-weight:700;color:#111827}
    .header p{font-size:12px;color:#6b7280;margin-top:2px}
    .tabs{display:flex;gap:8px;margin-bottom:18px}
    .tab{padding:7px 18px;border-radius:8px;border:1.5px solid #e5e7eb;font-size:13px;cursor:pointer;background:#fff;color:#6b7280;font-weight:500;transition:all .15s}
    .tab.active{border-color:#1d4ed8;background:#eff6ff;color:#1d4ed8}
    /* Upload zone */
    .upload-area{border:2px dashed #d1d5db;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;background:#fafafa;transition:all .15s;margin-bottom:12px}
    .upload-area:hover,.upload-area.drag{border-color:#1d4ed8;background:#eff6ff}
    .upload-area .icon{font-size:32px;margin-bottom:8px}
    .upload-area .main{font-size:14px;font-weight:600;color:#374151;margin-bottom:3px}
    .upload-area .sub{font-size:12px;color:#9ca3af}
    /* File list */
    .file-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    .file-item{display:flex;align-items:center;gap:10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:9px 12px}
    .file-item .fname{flex:1;font-size:13px;font-weight:500;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-item .fsize{font-size:11px;color:#6b7280;flex-shrink:0}
    .file-item .fstatus{font-size:11px;flex-shrink:0;min-width:70px;text-align:right}
    .btn-remove{background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;padding:2px 5px;flex-shrink:0}
    .btn-add{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#1d4ed8;background:none;border:none;cursor:pointer;padding:4px 0;margin-bottom:12px}
    .btn-analyze{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;background:#1d4ed8;color:#fff;transition:all .15s;margin-bottom:20px}
    .btn-analyze:disabled{background:#e5e7eb;color:#9ca3af;cursor:not-allowed}
    .btn-analyze:not(:disabled):hover{background:#1e40af}
    /* Results */
    .results-list{display:flex;flex-direction:column;gap:16px}
    .result-block{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}
    .result-header{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none}
    .result-header .rh-icon{font-size:18px;flex-shrink:0}
    .result-header .rh-name{flex:1;font-size:14px;font-weight:600;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .result-header .rh-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;flex-shrink:0}
    .badge-ok{background:#f0fdf4;color:#16a34a}
    .badge-warn{background:#fffbeb;color:#d97706}
    .badge-ko{background:#fef2f2;color:#dc2626}
    .badge-loading{background:#eff6ff;color:#1d4ed8}
    .result-header .rh-toggle{color:#9ca3af;font-size:12px;flex-shrink:0}
    .result-body{padding:0 16px 16px;display:none}
    .result-body.open{display:block}
    /* Score bar */
    .score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;padding-top:12px;border-top:1px solid #f3f4f6}
    .sc{background:#f9fafb;border-radius:8px;padding:10px 12px}
    .sc .sl{font-size:10px;color:#6b7280;margin-bottom:3px}
    .sc .sv{font-size:17px;font-weight:700;color:#111827}
    .summary{border-radius:8px;padding:9px 12px;font-size:12px;font-weight:500;margin-bottom:10px}
    /* Checks */
    .section-title{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px;padding-top:12px;border-top:1px solid #f3f4f6}
    .checks{display:flex;flex-direction:column;gap:6px}
    .check{display:flex;align-items:flex-start;gap:10px;background:#fafafa;border:1px solid #f3f4f6;border-radius:8px;padding:10px 12px}
    .check.sub{margin-left:20px;border-left:2px solid #e5e7eb}
    .ci{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .ci.ok{background:#f0fdf4;color:#16a34a}
    .ci.ko{background:#fef2f2;color:#dc2626}
    .ci.warn{background:#fffbeb;color:#d97706}
    .cinfo{flex:1;min-width:0}
    .cname{font-size:12px;font-weight:600;color:#111827;margin-bottom:1px}
    .badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:20px;margin-left:5px;vertical-align:middle;font-weight:500}
    .cdetail{font-size:11px;color:#6b7280;line-height:1.5}
    .cfound{font-size:10px;color:#16a34a;margin-top:2px;font-family:monospace}
    .calert{font-size:10px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:5px;padding:4px 8px;margin-top:4px}
    /* RGE section */
    .rge-section{margin-top:14px;padding-top:12px;border-top:1px solid #f3f4f6}
    .rge-title{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
    .rge-loading{font-size:12px;color:#6b7280;padding:8px 0}
    .rge-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;margin-bottom:6px}
    .rge-card .rc-name{font-size:13px;font-weight:600;color:#111827;margin-bottom:4px}
    .rge-card .rc-info{font-size:11px;color:#6b7280;margin-bottom:6px}
    .rge-cert{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-top:1px solid #f3f4f6}
    .rge-cert:first-child{border-top:none}
    .rge-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
    .dot-ok{background:#16a34a}
    .dot-ko{background:#dc2626}
    .rge-cert-info{flex:1;min-width:0}
    .rge-cert-domaine{font-size:11px;font-weight:600;color:#111827}
    .rge-cert-detail{font-size:10px;color:#6b7280}
    .rge-cert-expire{font-size:10px;color:#dc2626}
    .rge-not-found{font-size:12px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px}
    .rge-link{font-size:11px;color:#1d4ed8;margin-top:6px;display:block}
    .ti-section{margin-top:14px;padding-top:12px;border-top:1px solid #f3f4f6}
    .ti-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
    .ti-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
    .ti-table th{background:#f3f4f6;padding:6px 8px;text-align:left;font-weight:600;color:#374151;font-size:10px}
    .ti-table td{padding:6px 8px;border-bottom:1px solid #f9fafb;color:#374151;vertical-align:top}
    .ti-table tr:last-child td{border-bottom:none}
    .ti-elig td{background:#f0fdf4}
    .ti-excl td{background:#fef2f2}
    .ti-montant{font-weight:600;text-align:right;white-space:nowrap}
    .ti-summary{border-radius:8px;padding:10px 12px;margin-top:8px;font-size:12px}
    .ti-summary-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a}
    .ti-summary-warn{background:#fffbeb;border:1px solid #fde68a;color:#d97706}
    .ti-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0}
    .ti-row span:first-child{color:#6b7280}
    .ti-row span:last-child{font-weight:600}
    .ti-deduire{color:#dc2626;font-weight:700}
    .error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 12px;font-size:12px;color:#dc2626;margin-bottom:12px}
    footer{text-align:center;font-size:10px;color:#d1d5db;margin-top:40px}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">📋</div>
    <div>
      <h1>Agent Analyse Devis / Facture</h1>
      <p>Vérification automatique — MaPrimeRénov' 2026 · Multi-devis · Vérification RGE ADEME</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setMode('devis',this)">📄 Devis</button>
    <button class="tab" onclick="setMode('facture',this)">🧾 Facture</button>
  </div>

  <div id="drop-zone" class="upload-area" onclick="document.getElementById('file-input').click()">
    <div class="icon">📂</div>
    <div class="main">Cliquez ou déposez vos PDF ici</div>
    <div class="sub">Plusieurs PDF acceptés — max 10 Mo chacun</div>
  </div>
  <input type="file" id="file-input" accept="application/pdf" multiple style="display:none" onchange="onFiles(event)"/>

  <div class="file-list" id="file-list"></div>

  <button class="btn-analyze" id="btn-analyze" onclick="analyzeAll()" disabled>🔍 Analyser les devis</button>

  <div id="error" class="error" style="display:none"></div>
  <div class="results-list" id="results-list"></div>

  <footer>Critères MaPrimeRénov' / ANAH — Mis à jour 2026 · RGE vérifié via API ADEME</footer>
</div>

<script>
let files = [], mode = 'devis';

const LABELS = {
  siret:'SIRET / SIREN', date_emission:"Date d'émission", numero_document:'Numéro du document',
  rcs_rne:'Numéro RCS / RNE', adresse_siege:'Adresse du siège social', tva_intra:'TVA intracommunautaire',
  montants:'Montants HT / TTC / TVA', date_visite:'Date de visite technique', rge:'Qualification RGE',
  dechets:'Gestion des déchets', perf_menuiseries:'Menuiseries', perf_isolation:'Isolation thermique',
  perf_pac:'Pompe à chaleur / CET', perf_bois:'Chauffage bois'
};
const ISO_LABELS = {surface_isoler:'Surface à isoler', type_isolant:"Type d'isolant", epaisseur:'Épaisseur', acermi:'Certificat ACERMI'};
const ADMIN = ['siret','date_emission','numero_document','rcs_rne','adresse_siege','tva_intra','montants','date_visite','rge','dechets'];
const PERF = ['perf_menuiseries','perf_isolation','perf_pac','perf_bois'];

function setMode(m,el){
  mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('btn-analyze').textContent=`🔍 Analyser les ${m}s`;
  document.getElementById('results-list').innerHTML='';
}

function onFiles(e){
  Array.from(e.target.files).forEach(f=>addFile(f));
  e.target.value='';
}

function addFile(f){
  if(f.type!=='application/pdf'){alert('PDF uniquement: '+f.name);return}
  if(f.size>10*1024*1024){alert('Max 10Mo: '+f.name);return}
  if(files.find(x=>x.name===f.name&&x.size===f.size))return;
  files.push(f);
  renderFileList();
}

function removeFile(i){
  files.splice(i,1);
  renderFileList();
}

function renderFileList(){
  const el=document.getElementById('file-list');
  const btn=document.getElementById('btn-analyze');
  const dz=document.getElementById('drop-zone');
  if(files.length===0){el.innerHTML='';btn.disabled=true;dz.style.display='block';return}
  dz.style.display='none';
  btn.disabled=false;
  const count=files.length;
  btn.textContent=`🔍 Analyser ${count} ${mode}${count>1?'s':''}`
  el.innerHTML=files.map((f,i)=>`
    <div class="file-item">
      <span style="font-size:16px">📄</span>
      <span class="fname">${f.name}</span>
      <span class="fsize">${(f.size/1024).toFixed(0)} Ko</span>
      <button class="btn-remove" onclick="removeFile(${i})">✕</button>
    </div>
  `).join('')+`<button class="btn-add" onclick="document.getElementById('file-input').click()">➕ Ajouter un PDF</button>`;
}

// Drag & drop
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');Array.from(e.dataTransfer.files).forEach(f=>addFile(f))});

function fileToBase64(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Lecture impossible'));
    r.readAsDataURL(f);
  });
}

async function analyzeAll(){
  if(!files.length)return;
  const btn=document.getElementById('btn-analyze');
  btn.disabled=true;
  btn.textContent='⏳ Analyse en cours…';
  document.getElementById('error').style.display='none';
  document.getElementById('results-list').innerHTML='';

  // Créer un bloc résultat pour chaque fichier
  const resultsList=document.getElementById('results-list');
  files.forEach((f,i)=>{
    resultsList.innerHTML+=`
      <div class="result-block" id="rb-${i}">
        <div class="result-header" onclick="toggleResult(${i})">
          <span class="rh-icon">⏳</span>
          <span class="rh-name">${f.name}</span>
          <span class="rh-badge badge-loading" id="badge-${i}">En cours…</span>
          <span class="rh-toggle" id="toggle-${i}">▼</span>
        </div>
        <div class="result-body" id="body-${i}"></div>
      </div>`;
  });

  // Analyser en parallèle
  await Promise.all(files.map((f,i)=>analyzeOne(f,i)));

  btn.disabled=false;
  btn.textContent=`🔍 Analyser les ${mode}s`;
}

async function analyzeOne(f,i){
  try{
    const base64=await fileToBase64(f);
    const resp=await fetch('/api/analyze',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pdfBase64:base64,mode})
    });
    const data=await resp.json();
    if(data.error)throw new Error(data.error);
    renderResult(i,f.name,data);
    // Vérifier RGE si SIRET trouvé
    if(data.checks?.siret?.present&&data.checks?.siret?.valeur){
      checkRGE(i,data.checks.siret.valeur,data);
    }
  }catch(e){
    document.getElementById(`badge-${i}`).className='rh-badge badge-ko';
    document.getElementById(`badge-${i}`).textContent='Erreur';
    document.getElementById(`body-${i}`).innerHTML=`<div class="error" style="margin:12px">${e.message}</div>`;
    document.getElementById(`body-${i}`).classList.add('open');
    document.getElementById(`rb-${i}`).querySelector('.rh-icon').textContent='❌';
  }
}

function toggleResult(i){
  const body=document.getElementById(`body-${i}`);
  const toggle=document.getElementById(`toggle-${i}`);
  body.classList.toggle('open');
  toggle.textContent=body.classList.contains('open')?'▲':'▼';
}

function iconType(c){if(!c.present)return'ko';if(c.conforme===false)return'warn';return'ok'}
function badgeInfo(c){
  if(!c.present)return['ko','Absent'];
  if(c.conforme===false)return['warn','Non conforme'];
  if(c.conforme===true)return['ok','Conforme'];
  return['ok','Présent'];
}
function checkHTML(label,c,sub=false){
  const it=iconType(c),[bt,bl]=badgeInfo(c);
  const sym=it==='ok'?'✓':it==='warn'?'⚠':'✕';
  return`<div class="check${sub?' sub':''}">
    <div class="ci ${it}">${sym}</div>
    <div class="cinfo">
      <div class="cname">${label}<span class="badge badge-${bt}">${bl}</span></div>
      ${c.commentaire?`<div class="cdetail">${c.commentaire}</div>`:''}
      ${c.alerte_mpr?`<div class="calert">⚠ ${c.alerte_mpr}</div>`:''}
      ${c.present&&c.valeur&&c.valeur!=='null'&&c.valeur!=='Non applicable'?`<div class="cfound">${c.valeur}</div>`:''}
    </div>
  </div>`;
}

function renderResult(i,fname,r){
  const vc=r.verdict==='conforme'?'ok':r.verdict==='incomplet'?'warn':'ko';
  const vv=(r.verdict||'').charAt(0).toUpperCase()+(r.verdict||'').slice(1);
  const icon=vc==='ok'?'✅':vc==='warn'?'⚠️':'❌';

  document.getElementById(`rb-${i}`).querySelector('.rh-icon').textContent=icon;
  const badge=document.getElementById(`badge-${i}`);
  badge.className=`rh-badge badge-${vc}`;
  badge.textContent=vv;

  let html=`<div class="score-row">
    <div class="sc"><div class="sl">Score</div><div class="sv">${r.score}/${r.total}</div></div>
    <div class="sc"><div class="sl">Type</div><div class="sv" style="font-size:13px">${(r.type_document||'').charAt(0).toUpperCase()+(r.type_document||'').slice(1)}</div></div>
    <div class="sc"><div class="sl">Verdict</div><div class="sv" style="font-size:13px;color:${vc==='ok'?'#16a34a':vc==='warn'?'#d97706':'#dc2626'}">${vv}</div></div>
  </div>
  <div class="summary ${vc==='ok'?'badge-ok':vc==='warn'?'badge-warn':'badge-ko'}" style="background:${vc==='ok'?'#f0fdf4':vc==='warn'?'#fffbeb':'#fef2f2'};border:1px solid ${vc==='ok'?'#bbf7d0':vc==='warn'?'#fde68a':'#fecaca'}">${r.remarque_globale||''}</div>
  <div class="section-title">Éléments administratifs</div>
  <div class="checks">`;
  ADMIN.filter(k=>r.checks?.[k]).forEach(k=>{html+=checkHTML(LABELS[k]||k,r.checks[k])});
  html+=`</div><div class="section-title">Critères de performance</div><div class="checks">`;
  PERF.filter(k=>r.checks?.[k]).forEach(k=>{
    const c=r.checks[k];
    html+=checkHTML(LABELS[k]||k,c);

    // Sous-details isolation
    if(k==='perf_isolation'&&c.present&&c.details){
      Object.entries(c.details).forEach(([sk,sv])=>{html+=checkHTML(ISO_LABELS[sk]||sk,sv,true)});
    }

    // Sous-details PAC
    if(k==='perf_pac'&&c.present&&c.details){
      const d=c.details;
      if(d.type_pac)html+=`<div class="check sub"><div class="ci ok">i</div><div class="cinfo"><div class="cname sm">Type PAC</div><div class="cfound">${d.type_pac}</div></div></div>`;
      const pacFields=[
        {key:'etas',label:'ETAS (efficacite energetique saisonniere)'},
        {key:'scop',label:'SCOP (coefficient performance saisonnier)'},
        {key:'cop',label:'COP (coefficient performance)'},
        {key:'taux_couverture',label:'Taux de couverture PAC'}
      ];
      pacFields.forEach(f=>{
        if(d[f.key]){
          const sv=d[f.key];
          html+=checkHTML(f.label,{
            present:sv.present,
            valeur:sv.valeur||'',
            conforme:sv.conforme!==undefined?sv.conforme:null,
            alerte_mpr:'',
            commentaire:sv.commentaire||(!sv.present?'ABSENT - obligatoire pour eligibilite MPR':'')
          },true);
        }
      });
    }

    // Sous-details chauffage bois
    if(k==='perf_bois'&&c.present&&c.details){
      const d=c.details;
      if(d.type_equipement)html+=`<div class="check sub"><div class="ci ok">i</div><div class="cinfo"><div class="cname sm">Type equipement</div><div class="cfound">${d.type_equipement}</div></div></div>`;
      const boisFields=[
        {key:'flamme_verte',label:'Label Flamme Verte 7 etoiles'},
        {key:'rendement',label:'Rendement (>= 87%)'},
        {key:'etas',label:'ETAS (>= 111% poeles / >= 126% chaudieres)'}
      ];
      boisFields.forEach(f=>{
        if(d[f.key]){
          const sv=d[f.key];
          html+=checkHTML(f.label,{
            present:sv.present,
            valeur:sv.valeur||'',
            conforme:sv.conforme!==undefined?sv.conforme:null,
            alerte_mpr:'',
            commentaire:sv.commentaire||(!sv.present?'ABSENT - obligatoire pour eligibilite MPR':'')
          },true);
        }
      });
    }
  });
  html+=`</div>`;

  // Zone RGE
  html+=`<div class="rge-section" id="rge-section-${i}">
    <div class="rge-title">🏅 Vérification RGE — Annuaire ADEME</div>
    <div class="rge-loading" id="rge-content-${i}">⏳ Vérification en cours…</div>
  </div>`;

  // Recap financier
  const montantsCheck = r.checks?.montants
  if(montantsCheck?.details){
    const d = montantsCheck.details
    html += `<div class="ti-section">`
    html += `<div class="ti-title" style="color:#1d4ed8">💰 Récapitulatif financier</div>`

    // Total HT et TTC
    if(d.total_ht || d.total_ttc){
      html += `<div class="ti-summary ti-summary-ok" style="margin-bottom:8px">
        <div class="ti-row"><span>Total HT (apres remises)</span><span style="font-weight:700;font-size:14px">${d.total_ht ? d.total_ht.toLocaleString('fr-FR',{minimumFractionDigits:2})+'€' : '-'}</span></div>
        <div class="ti-row" style="border-top:1px solid #bbf7d0;padding-top:5px;margin-top:4px"><span>Total TTC</span><span style="font-weight:700;font-size:14px">${d.total_ttc ? d.total_ttc.toLocaleString('fr-FR',{minimumFractionDigits:2})+'€' : '-'}</span></div>
      </div>`
    }

    // Remises
    if(d.remises && d.remises.length > 0 && d.remises[0].designation){
      html += `<div class="ti-title" style="color:#6b7280;margin-top:8px">🏷 Remises et reductions (deja deduites du total)</div>`
      html += `<table class="ti-table"><tr><th>Designation</th><th>Montant HT</th><th>Note</th></tr>`
      d.remises.forEach(rem => {
        html += `<tr><td>${rem.designation||''}</td>
          <td class="ti-montant" style="color:#6b7280">${rem.montant_ht ? rem.montant_ht.toLocaleString('fr-FR',{minimumFractionDigits:2})+'€' : '-'}</td>
          <td style="font-size:10px;color:#6b7280">Deja incluse dans le total HT</td>
        </tr>`
      })
      html += `</table>`
    }

    // TVA breakdown
    if(d.taux_tva && d.taux_tva.length > 0){
      const multiTVA = d.alerte_tva_multiple
      html += `<div class="ti-title" style="color:${multiTVA?'#d97706':'#374151'};margin-top:8px">${multiTVA?'⚠':'📊'} Taux de TVA appliques${multiTVA?' — PLUSIEURS TAUX DETECTES':''}</div>`
      if(multiTVA && d.commentaire_tva){
        html += `<div class="calert" style="margin-bottom:6px">⚠ ${d.commentaire_tva}</div>`
      }
      if(d.lignes_tva && d.lignes_tva.length > 0 && d.lignes_tva[0].taux){
        html += `<table class="ti-table"><tr><th>Taux TVA</th><th>Base HT</th><th>Montant TVA</th><th>Postes concernes</th></tr>`
        d.lignes_tva.forEach(lt => {
          html += `<tr>
            <td style="font-weight:600">${lt.taux||''}%</td>
            <td class="ti-montant">${lt.montant_ht ? lt.montant_ht.toLocaleString('fr-FR',{minimumFractionDigits:2})+'€' : '-'}</td>
            <td class="ti-montant">${lt.montant_tva ? lt.montant_tva.toLocaleString('fr-FR',{minimumFractionDigits:2})+'€' : '-'}</td>
            <td style="font-size:10px;color:#6b7280">${lt.postes||''}</td>
          </tr>`
        })
        html += `</table>`
      } else {
        html += `<div style="font-size:11px;color:#374151;padding:4px 0">Taux: ${d.taux_tva.join(', ')}%</div>`
      }
    }
    html += `</div>`
  }

  // Travaux induits
  const ti = r.travaux_induits
  if(ti){
    const hasElig = ti.eligibles && ti.eligibles.length > 0 && ti.eligibles[0].designation
    const hasExcl = ti.exclus && ti.exclus.length > 0 && ti.exclus[0].designation

    html += `<div class="ti-section">`
    html += `<div class="ti-title" style="color:#1d4ed8">📋 Travaux induits — Analyse ligne par ligne (Guide ANAH Juillet 2025)</div>`

    if(hasElig){
      html += `<div class="ti-title" style="color:#16a34a;margin-top:8px">✅ Travaux induits eligibles (${ti.eligibles.length})</div>`
      html += `<table class="ti-table"><tr><th>Designation</th><th>Montant HT</th><th>Commentaire</th></tr>`
      ti.eligibles.forEach(t => {
        html += `<tr class="ti-elig">
          <td>${t.designation||''}</td>
          <td class="ti-montant">${t.montant_ht>0?t.montant_ht.toLocaleString('fr-FR',{minimumFractionDigits:2})+'€':'-'}</td>
          <td>${t.commentaire||''}</td>
        </tr>`
      })
      html += `</table>`
    }

    if(hasExcl){
      html += `<div class="ti-title" style="color:#dc2626;margin-top:10px">❌ Travaux induits exclus — A deduire du montant (${ti.exclus.length})</div>`
      html += `<table class="ti-table"><tr><th>Designation</th><th>Montant HT</th><th>Raison exclusion</th></tr>`
      ti.exclus.forEach(t => {
        html += `<tr class="ti-excl">
          <td>${t.designation||''}</td>
          <td class="ti-montant ti-deduire">${t.montant_ht>0?'-'+t.montant_ht.toLocaleString('fr-FR',{minimumFractionDigits:2})+'€':'-'}</td>
          <td>${t.raison_exclusion||t.commentaire||''}</td>
        </tr>`
      })
      html += `</table>`
    }

    if(ti.montant_corrige_ht>0 || ti.montant_a_deduire_ht>0){
      const hasDeduction = ti.montant_a_deduire_ht > 0
      html += `<div class="ti-summary ${hasDeduction?'ti-summary-warn':'ti-summary-ok'}">
        ${ti.montant_a_deduire_ht>0?`<div class="ti-row"><span>Montant total HT du devis</span><span>${(ti.montant_corrige_ht+ti.montant_a_deduire_ht).toLocaleString('fr-FR',{minimumFractionDigits:2})} €</span></div>
        <div class="ti-row"><span>Travaux induits exclus a deduire</span><span class="ti-deduire">- ${ti.montant_a_deduire_ht.toLocaleString('fr-FR',{minimumFractionDigits:2})} €</span></div>
        <div class="ti-row" style="border-top:1px solid #fde68a;padding-top:6px;margin-top:4px"><span style="font-weight:600">Montant HT corrige eligble MPR</span><span style="font-weight:700;font-size:13px">${ti.montant_corrige_ht.toLocaleString('fr-FR',{minimumFractionDigits:2})} €</span></div>`:''}
        ${ti.commentaire_global?`<div style="margin-top:6px;font-size:10px;color:#6b7280">${ti.commentaire_global}</div>`:''}
      </div>`
    }

    // Remises dans travaux induits
    const hasRemises = ti.remises && ti.remises.length > 0 && ti.remises[0].designation
    if(hasRemises){
      html += `<div class="ti-title" style="color:#6b7280;margin-top:10px">🏷 Remises identifiees (deja deduites - non retraitees)</div>`
      html += `<table class="ti-table"><tr><th>Designation</th><th>Montant HT</th><th>Note</th></tr>`
      ti.remises.forEach(rem => {
        html += `<tr><td>${rem.designation||''}</td>
          <td class="ti-montant" style="color:#6b7280">${rem.montant_ht ? rem.montant_ht.toLocaleString('fr-FR',{minimumFractionDigits:2})+'€' : '-'}</td>
          <td style="font-size:10px;color:#6b7280">${rem.commentaire||'Remise deja incluse dans le total HT'}</td>
        </tr>`
      })
      html += `</table>`
    }

    if(!hasElig && !hasExcl){
      html += `<div style="font-size:12px;color:#6b7280;padding:8px 0">Aucun travail induit identifie dans ce devis.</div>`
    }

    html += `</div>`
  }

  const body=document.getElementById(`body-${i}`);
  body.innerHTML=html;
  body.classList.add('open');
  document.getElementById(`toggle-${i}`).textContent='▲';
}

async function checkRGE(i,siretRaw,analysisData){
  const siret=siretRaw.replace(/\s/g,'');
  const rgeEl=document.getElementById(`rge-content-${i}`);
  if(!rgeEl)return;

  try{
    const resp=await fetch(`/api/rge?siret=${siret}`);
    const data=await resp.json();
    const liens=data.liens||{};
    const checks=analysisData.checks||{};
    const hasIso=checks.perf_isolation?.present;
    const hasMenui=checks.perf_menuiseries?.present;
    const hasPac=checks.perf_pac?.present;
    const hasBois=checks.perf_bois?.present;

    let html=`<div class="rge-card">`;

    if(data.found){
      html+=`<div class="rc-name">🏢 ${data.nom_entreprise}</div>
      <div class="rc-info">${data.adresse||''}</div>
      <div class="rc-info" style="margin-top:2px">SIRET : ${siret}</div>`;

      // Vérifier validité RGE depuis le devis analysé
      const rgeCheck = analysisData.checks?.rge;
      const rgeValeur = rgeCheck?.valeur || '';
      const rgeCommentaire = rgeCheck?.commentaire || '';

      // Extraire date expiration du commentaire RGE
      const dateMatch = rgeValeur.match(/(\d{2}[\/\-]\d{2}[\/\-]\d{4})/);
      if(dateMatch){
        const parts = dateMatch[1].split(/[\/\-]/);
        const dateExp = new Date(parts[2], parts[1]-1, parts[0]);
        const today = new Date();
        const expired = dateExp < today;
        const daysLeft = Math.ceil((dateExp - today) / (1000*60*60*24));
        if(expired){
          html+=`<div class="calert" style="margin:6px 0">❌ RGE EXPIRE le ${dateMatch[1]} — Non eligible MPR. Demandez un nouveau certificat RGE valide.</div>`;
        } else if(daysLeft < 90){
          html+=`<div class="calert" style="margin:6px 0">⚠ RGE expire dans ${daysLeft} jours (${dateMatch[1]}) — A renouveler rapidement.</div>`;
        } else {
          html+=`<div style="font-size:10px;color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:5px;padding:4px 8px;margin:6px 0">✅ RGE valide jusqu au ${dateMatch[1]} (${daysLeft} jours restants)</div>`;
        }
      }

      if(rgeValeur){
        html+=`<div class="rge-cert-detail" style="margin:4px 0">📋 ${rgeValeur}</div>`;
      }

      // Labels RGE trouvés via API
      const certs=data.certifications_api||[];
      if(certs.length>0){
        html+=`<div style="font-size:10px;font-weight:600;color:#16a34a;margin:8px 0 4px">✅ Certifications RGE detectees via API (${certs.length})</div>`;
        certs.forEach(c=>{
          html+=`<div class="rge-cert">
            <div class="rge-dot dot-ok"></div>
            <div class="rge-cert-info">
              <div class="rge-cert-domaine">${c.label||c.libelle||''}</div>
            </div>
          </div>`;
        });
      } else {
        html+=`<div class="calert" style="margin:6px 0">⚠ Verification automatique limitee — confirmez via les liens ci-dessous</div>`;
      }
    } else {
      html+=`<div style="font-size:12px;color:#dc2626;font-weight:600;margin-bottom:4px">❌ Entreprise non trouvee dans l annuaire</div>`;
      html+=`<div style="font-size:12px;color:#6b7280;margin-bottom:6px">${data.message||''}</div>`;
    }

    // Liens de vérification manuelle — toujours affichés
    html+=`<div style="font-size:10px;font-weight:600;color:#374151;margin:10px 0 6px;padding-top:8px;border-top:1px solid #f3f4f6">🔗 Vérifier manuellement :</div>
    <div style="display:flex;flex-direction:column;gap:5px">
      <a class="rge-link" href="${liens.annuaire_entreprises||`https://annuaire-entreprises.data.gouv.fr/labels-certificats/${siret}`}" target="_blank">📋 Annuaire des Entreprises — Labels & Certificats RGE</a>
      <a class="rge-link" href="${liens.france_renov||'https://france-renov.gouv.fr/annuaires-professionnels/artisan-rge-architecte#/tab'}" target="_blank">🏠 France Rénov' — Annuaire RGE officiel</a>
      ${liens.qualibat?`<a class="rge-link" href="${liens.qualibat}" target="_blank">🏗 Qualibat — Annuaire entreprises</a>`:''}
    </div>`;

    // Rappel des domaines à vérifier
    const domainesAVerifier=[];
    if(hasIso)domainesAVerifier.push('Isolation thermique (ITI/ITE/combles)');
    if(hasMenui)domainesAVerifier.push('Menuiseries / Fermetures');
    if(hasPac)domainesAVerifier.push('Chauffage / Pompe à chaleur');
    if(hasBois)domainesAVerifier.push('Chauffage bois / Biomasse');

    if(domainesAVerifier.length>0){
      html+=`<div style="font-size:10px;font-weight:600;color:#374151;margin:10px 0 4px">⚠ Domaines à vérifier pour ce devis :</div>
      ${domainesAVerifier.map(d=>`<div style="font-size:10px;color:#6b7280;padding:2px 0">• ${d}</div>`).join('')}`;
    }

    html+=`</div>`;
    rgeEl.innerHTML=html;

  }catch(e){
    const sirenNum=siret.substring(0,9);
    const rgeEl2=document.getElementById(`rge-content-${i}`);
    if(rgeEl2)rgeEl2.innerHTML=`<div class="rge-card">
      <div style="font-size:12px;color:#6b7280;margin-bottom:8px">Vérification automatique indisponible</div>
      <a class="rge-link" href="https://annuaire-entreprises.data.gouv.fr/labels-certificats/${siret}" target="_blank">📋 Vérifier sur l'Annuaire des Entreprises</a><br>
      <a class="rge-link" href="https://france-renov.gouv.fr/annuaires-professionnels/artisan-rge-architecte#/tab" target="_blank">🏠 France Rénov' — Annuaire RGE</a>
    </div>`;
  }
}
</script>
